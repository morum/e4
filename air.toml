root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/e4 ./cmd/e4"
  bin = "./tmp/e4"
  full_bin = "./tmp/e4 serve --listen :2222 --log-level debug"
  include_ext = ["go"]
  include_file = ["go.mod", "go.sum"]
  exclude_dir = ["tmp", "vendor", ".git"]
  delay = 500
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
